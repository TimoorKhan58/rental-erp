# TLS baseline — HTTPS readiness (Phase 8-005).
# Replace certificate files under /etc/nginx/certs/ before production use.
# See docs/production/REVERSE_PROXY.md for Let's Encrypt / org-cert guidance.

ssl_certificate     /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;

ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;

# Modern TLS — HTTP/2 is enabled on the listen directive.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;

# OCSP stapling (enable once real certificates with CA chain are installed).
# ssl_stapling on;
# ssl_stapling_verify on;
# ssl_trusted_certificate /etc/nginx/certs/fullchain.pem;
# resolver 1.1.1.1 8.8.8.8 valid=300s;
# resolver_timeout 5s;
