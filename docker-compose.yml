name: rental-erp-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rental}
      POSTGRES_DB: ${POSTGRES_DB:-rental_erp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-rental} -d ${POSTGRES_DB:-rental_erp}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rental-erp

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-Rental ERP}
      APP_URL: ${APP_URL:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-change-me-32-characters-min}
      DATABASE_URL: postgresql://${POSTGRES_USER:-rental}:${POSTGRES_PASSWORD:-rental}@db:5432/${POSTGRES_DB:-rental_erp}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      UPLOAD_STORAGE: ${UPLOAD_STORAGE:-local}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      ENABLE_SMS: ${ENABLE_SMS:-false}
      TIMEZONE: ${TIMEZONE:-Asia/Karachi}
      APP_LOCALE: ${APP_LOCALE:-en-PK}
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
      - app_uploads:/app/uploads
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint.dev.sh"]
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - rental-erp

  # Optional one-off: docker compose run --rm migrate
  migrate:
    profiles: ["migrate"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rental}:${POSTGRES_PASSWORD:-rental}@db:5432/${POSTGRES_DB:-rental_erp}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-change-me-32-characters-min}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: development
      APP_ENV: ${APP_ENV:-local}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    working_dir: /app
    entrypoint: ["/bin/sh", "/app/scripts/docker-entrypoint.sh"]
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental-erp

volumes:
  postgres_data:
  app_node_modules:
  app_next:
  app_uploads:

networks:
  rental-erp:
    driver: bridge
