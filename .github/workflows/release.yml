name: Release Build

# Builds and validates release artifacts for version tags.
# Does NOT deploy and does NOT push images to a registry.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref_label:
        description: Optional label for the local Docker image tag
        required: false
        default: manual

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  APP_ENV: local
  APP_URL: http://localhost:3000
  BETTER_AUTH_URL: http://localhost:3000
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/rental_erp_ci
  BETTER_AUTH_SECRET: ci-build-placeholder-secret-32chars!!

jobs:
  release-validate:
    name: Release Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup application toolchain
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prisma validate
        run: npx prisma validate

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Environment config checks
        run: npm run config:check

      - name: Production build
        run: npm run build

  release-docker:
    name: Release Docker Image Build
    runs-on: ubuntu-latest
    needs: release-validate
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            label="${{ github.event.inputs.ref_label || 'manual' }}"
            echo "image_tag=${label}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build release image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false
          tags: |
            rental-erp:${{ steps.meta.outputs.image_tag }}
            rental-erp:release-${{ github.sha }}
          cache-from: type=gha,scope=rental-erp-runner
          cache-to: type=gha,mode=max,scope=rental-erp-runner
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            APP_ENV=local
            NODE_ENV=production
            APP_URL=http://localhost:3000
            BETTER_AUTH_URL=http://localhost:3000
            DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/rental_erp_ci
            BETTER_AUTH_SECRET=ci-build-placeholder-secret-32chars!!
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}

      - name: Summarize release artifact
        shell: bash
        run: |
          {
            echo "## Release build complete"
            echo ""
            echo "- Ref: \`${GITHUB_REF}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Local image tag: \`rental-erp:${{ steps.meta.outputs.image_tag }}\`"
            echo "- Registry push: **disabled** (Phase 8-004)"
            echo "- Deployment: **not performed** (later phase)"
          } >> "$GITHUB_STEP_SUMMARY"
