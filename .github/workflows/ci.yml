name: Continuous Integration

# Runs on pushes to protected branches and on-demand.
# Pull requests are handled by pull-request.yml to avoid duplicate runs.
# Does NOT deploy and does NOT push Docker images.

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  NEXT_TELEMETRY_DISABLED: "1"
  APP_ENV: local
  APP_URL: http://localhost:3000
  BETTER_AUTH_URL: http://localhost:3000
  # CI placeholders only — not production secrets. Real secrets belong in GitHub Secrets for later deploy phases.
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/rental_erp_ci
  BETTER_AUTH_SECRET: ci-build-placeholder-secret-32chars!!

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup application toolchain
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Prisma validate
        run: npx prisma validate

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Environment config checks
        run: npm run config:check

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup application toolchain
        uses: ./.github/actions/setup-node-ci
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Next.js production build
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false
          tags: rental-erp:ci-${{ github.sha }}
          cache-from: type=gha,scope=rental-erp-runner
          cache-to: type=gha,mode=max,scope=rental-erp-runner
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            APP_ENV=local
            NODE_ENV=production
            APP_URL=http://localhost:3000
            BETTER_AUTH_URL=http://localhost:3000
            DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/rental_erp_ci
            BETTER_AUTH_SECRET=ci-build-placeholder-secret-32chars!!
